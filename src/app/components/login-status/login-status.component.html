<div class="login-status-header">
  <div *ngIf="isAuthenticated && userName" class="login-status-user-info">
    Hi {{ userName }}
  </div>

  <a *ngIf="!isAuthenticated" routerLink="/login" class="security-btn">
    Login
  </a>

  <a
    *ngIf="!isAuthenticated"
    routerLink="/register"
    class="security-btn register-btn"
  >
    Register
  </a>

  <button *ngIf="isAuthenticated" (click)="logout()" class="security-btn">
    Logout
  </button>

  <div *ngIf="isAuthenticated" class="order-history">
    <a routerLink="/orders" routerLinkActive="active-link" class="security-btn"
      >Orders</a
    >
  </div>

  <div *ngIf="isAuthenticated" class="my-account-link">
    <a routerLink="/orders" class="security-btn">My Account</a>
  </div>
</div>
