<div class="login-status-header">
  <span *ngIf="isAuthenticated && userName" class="login-status-user-info">
    Hi {{ userName }}
  </span>

  <a *ngIf="!isAuthenticated" routerLink="/login" class="header-text-link">
    {{ "AUTH.LOGIN" | translate }}
  </a>
  <span *ngIf="!isAuthenticated" class="link-divider">|</span>
  <a *ngIf="!isAuthenticated" routerLink="/register" class="header-text-link">
    {{ "AUTH.REGISTER" | translate }}
  </a>
  <span class="link-divider">|</span>

  <a routerLink="/orders" class="header-text-link">{{
    "AUTH.ORDERS" | translate
  }}</a>
  <span class="link-divider">|</span>
  <a routerLink="/orders" class="header-text-link">{{
    "AUTH.MY_ACCOUNT" | translate
  }}</a>

  <button
    *ngIf="isAuthenticated"
    (click)="logout()"
    class="header-text-link logout-link"
  >
    {{ "AUTH.LOGOUT" | translate }}
  </button>
</div>
