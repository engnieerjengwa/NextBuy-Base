<div class="top-nav-menu">
  <nav class="main-nav">
    <div class="nav-list">
      <!-- Shop By Department Dropdown -->
      <div
        class="dept-dropdown-container"
        (mouseenter)="openMainDropdown()"
        (mouseleave)="closeMainDropdown()"
      >
        <button class="dept-dropdown-btn" (click)="toggleMainDropdown()">
          Shop by Department
          <i class="fa fa-chevron-down dept-chevron"></i>
        </button>

        <!-- Dropdown Panel -->
        <div class="dept-dropdown-panel" [class.show]="isMainDropdownOpen">
          <ul class="dept-list">
            <li *ngFor="let cat of mainCategories" class="dept-list-item">
              <a
                [routerLink]="[
                  '/category',
                  cat.id,
                  cat.slug || cat.categoryName,
                ]"
                class="dept-list-link"
                (click)="closeMainDropdown()"
              >
                <span>{{ cat.categoryName }}</span>
                <i class="fa fa-chevron-right dept-arrow"></i>
              </a>
            </li>
          </ul>
          <a
            routerLink="/products"
            class="dept-promo-banner"
            (click)="closeMainDropdown()"
          >
            <span class="promo-brand">NexBuy</span
            ><span class="promo-more">more</span>
            <span class="promo-deals">Deals</span>
          </a>
        </div>
      </div>

      <!-- Quick Nav Links -->
      <div class="nav-links">
        <a
          class="nav-pill"
          routerLink="/products"
          routerLinkActive="active-link"
          >ALOT For Less</a
        >
        <a
          class="nav-pill"
          routerLink="/category/new-arrivals"
          routerLinkActive="active-link"
          >New Arrivals</a
        >
        <a
          class="nav-pill fire-sale"
          routerLink="/category/deals"
          routerLinkActive="active-link"
          >Fire Sale</a
        >
        <a
          class="nav-pill"
          routerLink="/category/brands"
          routerLinkActive="active-link"
          >Brands Store</a
        >
        <a
          class="nav-pill nexbuy-more"
          routerLink="/category/trending"
          routerLinkActive="active-link"
          >NexBuyMORE</a
        >
        <a
          class="nav-pill"
          routerLink="/category/clearance"
          routerLinkActive="active-link"
          >Clearance</a
        >
      </div>
    </div>
  </nav>
</div>
