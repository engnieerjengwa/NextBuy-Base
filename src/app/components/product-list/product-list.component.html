<div class="main-content">
  <!-- Hero Banner - Home page only -->
  <app-hero-banner *ngIf="isHomePage()"></app-hero-banner>

  <!-- Featured Products Carousel - Home page only -->
  <app-product-carousel
    *ngIf="isHomePage() && featuredProducts.length > 0"
    [products]="featuredProducts"
    [title]="'Featured Products'"
    [showViewAll]="true"
    [viewAllLink]="'/products'"
  ></app-product-carousel>

  <!-- New Arrivals Carousel - Home page only -->
  <app-product-carousel
    *ngIf="isHomePage() && newArrivals.length > 0"
    [products]="newArrivals"
    [title]="'New Arrivals'"
    [showViewAll]="true"
    [viewAllLink]="'/products'"
  ></app-product-carousel>

  <!-- Promo Banner Grid - Home page only -->
  <app-promo-banner-grid
    *ngIf="isHomePage()"
    [title]="'Shop by Category'"
  ></app-promo-banner-grid>

  <!-- Daily Deals Carousel - Home page only -->
  <app-product-carousel
    *ngIf="isHomePage() && dealsProducts.length > 0"
    [products]="dealsProducts"
    [title]="'Daily Deals'"
    [showViewAll]="true"
    [viewAllLink]="'/products'"
    [showFireSale]="true"
    [actionLabel]="'View All Deals'"
    [actionLink]="'/products'"
  ></app-product-carousel>

  <!-- Brand Carousel - Home page only -->
  <app-brand-carousel *ngIf="isHomePage()"></app-brand-carousel>

  <!-- Trending Now Carousel - Home page only -->
  <app-product-carousel
    *ngIf="isHomePage() && trendingProducts.length > 0"
    [products]="trendingProducts"
    [title]="'Trending Now'"
    [showViewAll]="true"
    [viewAllLink]="'/products'"
  ></app-product-carousel>

  <!-- Membership Banner - Home page only -->
  <app-membership-banner *ngIf="isHomePage()"></app-membership-banner>

  <!-- Product Listing Section - Category/Search pages only -->
  <div class="section-content section-content-p30" *ngIf="!isHomePage()">
    <div class="container-fluid">
      <div class="product-listing-layout">
        <!-- Filter Sidebar - only on browsing/search pages -->
        <aside class="filter-sidebar-col" *ngIf="!isHomePage()">
          <app-subcategory-nav
            *ngIf="currentCategoryId > 0"
            [categoryId]="currentCategoryId"
          ></app-subcategory-nav>
          <app-filter-sidebar
            [categoryId]="currentCategoryId > 0 ? currentCategoryId : null"
            (filtersChanged)="onFiltersChanged($event)"
          ></app-filter-sidebar>
        </aside>

        <!-- Main Content Area -->
        <div class="product-main-col" [class.full-width]="isHomePage()">
          <!-- Sort Bar -->
          <div class="toolbar" *ngIf="!isHomePage()">
            <app-sort-bar
              [totalResults]="theTotalElements"
              [searchQuery]="currentKeyword"
              [currentSort]="currentSort"
              (sortChanged)="onSortChanged($event)"
            ></app-sort-bar>
          </div>

          <h4 *ngIf="!searchMode" class="section-heading">
            {{ currentCategoryName }}
          </h4>
          <hr />

          <!-- Product Grid -->
          <div class="row product-grid">
            <div
              *ngFor="let tempProduct of products"
              class="col-xl-3 col-lg-3 col-md-4 col-sm-6 col-6"
            >
              <div class="product-card-wrapper">
                <app-product-card
                  [product]="tempProduct"
                  [showAddToCart]="true"
                  (addToCartClicked)="addToCart($event)"
                ></app-product-card>
              </div>
            </div>

            <!-- No products found -->
            <div
              *ngIf="products.length === 0 && !isLoading"
              class="alert alert-warning col-12"
              role="alert"
            >
              No products matching your search were found!
            </div>
          </div>

          <!-- Infinite Scroll -->
          <div class="infinite-scroll-status" *ngIf="!isHomePage()">
            <div *ngIf="isLoading" class="loading-indicator">
              <div class="spinner"></div>
              <span>Loading more products...</span>
            </div>
            <div
              *ngIf="!isLoading && products.length > 0"
              class="products-count"
            >
              Showing {{ products.length }} of {{ theTotalElements }} products
            </div>
            <div
              *ngIf="allLoaded && products.length > 0"
              class="all-loaded-message"
            >
              You've reached the end of the results
            </div>
            <button
              *ngIf="!allLoaded && !isLoading && products.length > 0"
              class="btn-load-more"
              (click)="loadMore()"
            >
              Load More Products
            </button>
            <div #scrollSentinel class="scroll-sentinel"></div>
          </div>
        </div>
      </div>
    </div>
  </div>
</div>
